<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSC 177 — AI Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e14;
    --surface: #16161f;
    --surface2: #1e1e2e;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #4fd1c5;
    --accent3: #f6ad55;
    --danger: #fc8181;
    --success: #68d391;
    --text: #e2e2f0;
    --muted: #8888aa;
    --code-bg: #111120;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TOP NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,20,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; gap: 24px;
    height: 60px;
  }
  .nav-logo { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; }
  .nav-logo span { color: var(--accent2); }
  .nav-tabs { display: flex; gap: 4px; overflow-x: auto; flex: 1; }
  .nav-tab {
    padding: 6px 14px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; white-space: nowrap;
    color: var(--muted); border: none; background: transparent;
    transition: all 0.2s;
  }
  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active { color: var(--accent); background: rgba(124,106,247,0.15); }

  /* API KEY BANNER */
  .api-banner {
    background: linear-gradient(135deg, rgba(124,106,247,0.15), rgba(79,209,197,0.1));
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .api-banner label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .api-input {
    flex: 1; min-width: 200px; max-width: 400px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px;
    outline: none;
  }
  .api-input:focus { border-color: var(--accent); }
  .api-save-btn {
    padding: 7px 16px; border-radius: 8px; cursor: pointer;
    background: var(--accent); color: white; border: none;
    font-size: 13px; font-weight: 600; font-family: 'Syne', sans-serif;
    transition: opacity 0.2s;
  }
  .api-save-btn:hover { opacity: 0.85; }
  .api-status { font-size: 12px; }
  .api-status.ok { color: var(--success); }
  .api-status.warn { color: var(--accent3); }

  /* MAIN LAYOUT */
  .main { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

  .lesson-header {
    margin-bottom: 36px;
    padding: 28px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    position: relative; overflow: hidden;
  }
  .lesson-header::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .lesson-tag {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
  }
  .lesson-title { font-size: 26px; font-weight: 800; line-height: 1.2; }
  .lesson-desc { margin-top: 8px; color: var(--muted); font-size: 14px; line-height: 1.6; }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .question-card:focus-within { border-color: rgba(124,106,247,0.4); }

  .q-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 16px;
  }
  .q-num {
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    color: white; font-size: 11px; font-weight: 800;
    padding: 3px 10px; border-radius: 20px; white-space: nowrap;
    letter-spacing: 0.5px; margin-top: 2px;
  }
  .q-text { font-size: 15px; line-height: 1.65; flex: 1; }
  .q-type-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 20px; white-space: nowrap;
    text-transform: uppercase;
  }
  .badge-mc { background: rgba(246,173,85,0.15); color: var(--accent3); }
  .badge-code { background: rgba(124,106,247,0.15); color: var(--accent); }
  .badge-written { background: rgba(79,209,197,0.15); color: var(--accent2); }

  /* CODE BLOCKS in question */
  pre.q-code {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin: 12px 0 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
    color: #c9d1d9;
  }

  /* ANSWER AREA */
  .q-body { padding: 16px 24px; }

  /* Multiple choice */
  .mc-options { display: flex; flex-direction: column; gap: 8px; }
  .mc-option {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer; transition: all 0.15s;
  }
  .mc-option:hover { border-color: var(--accent); background: rgba(124,106,247,0.08); }
  .mc-option input[type=radio] { accent-color: var(--accent); margin-top: 2px; flex-shrink: 0; }
  .mc-option.selected { border-color: var(--accent); background: rgba(124,106,247,0.12); }
  .mc-option label { cursor: pointer; font-size: 14px; line-height: 1.5; }

  /* Code textarea */
  .code-textarea {
    width: 100%; min-height: 140px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: #c9d1d9;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; line-height: 1.7;
    resize: vertical; outline: none;
    tab-size: 4;
    transition: border-color 0.2s;
  }
  .code-textarea:focus { border-color: var(--accent); }

  /* Written textarea */
  .written-textarea {
    width: 100%;
    min-height: 90px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px; line-height: 1.6;
    resize: vertical; outline: none;
    transition: border-color 0.2s;
  }
  .written-textarea:focus { border-color: var(--accent); }

  /* HINT BOX */
  .hint-toggle {
    margin-top: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer; font-size: 12px; font-weight: 600;
    color: var(--accent3); letter-spacing: 0.5px;
    background: rgba(246,173,85,0.1); border: 1px solid rgba(246,173,85,0.2);
    border-radius: 20px; padding: 5px 12px;
    transition: all 0.2s; user-select: none; border: none;
  }
  .hint-toggle:hover { background: rgba(246,173,85,0.18); }
  .hint-box {
    display: none; margin-top: 10px;
    background: var(--code-bg);
    border: 1px solid rgba(246,173,85,0.25);
    border-left: 3px solid var(--accent3);
    border-radius: 8px; padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px; line-height: 1.75; color: #c9d1d9;
  }
  .hint-box.open { display: block; }
  .hint-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    color: var(--accent3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }

  /* ACTION ROW */
  .action-row { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }

  .btn-submit {
    padding: 9px 20px; border-radius: 8px; cursor: pointer;
    background: var(--accent); color: white; border: none;
    font-size: 13px; font-weight: 700; font-family: 'Syne', sans-serif;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-submit.loading { opacity: 0.7; cursor: wait; }

  .btn-reveal {
    padding: 9px 18px; border-radius: 8px; cursor: pointer;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
    font-size: 13px; font-weight: 600; font-family: 'Syne', sans-serif;
    transition: all 0.2s;
  }
  .btn-reveal:hover { color: var(--text); border-color: var(--muted); }

  /* ANSWER REVEAL */
  .answer-reveal {
    display: none; margin-top: 14px;
    background: rgba(104,211,145,0.07);
    border: 1px solid rgba(104,211,145,0.2);
    border-left: 3px solid var(--success);
    border-radius: 8px; padding: 14px 16px;
  }
  .answer-reveal.open { display: block; }
  .answer-reveal-label {
    font-size: 11px; font-weight: 700; color: var(--success);
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px;
  }
  .answer-reveal pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px; line-height: 1.7; color: #c9d1d9;
    white-space: pre-wrap;
  }
  .answer-reveal p { font-size: 14px; line-height: 1.6; }

  /* FEEDBACK BOX */
  .feedback-box {
    display: none; margin-top: 14px;
    border-radius: 8px; padding: 16px 18px;
    font-size: 14px; line-height: 1.7;
  }
  .feedback-box.open { display: block; }
  .feedback-box.correct {
    background: rgba(104,211,145,0.08);
    border: 1px solid rgba(104,211,145,0.25);
  }
  .feedback-box.incorrect {
    background: rgba(252,129,129,0.08);
    border: 1px solid rgba(252,129,129,0.25);
  }
  .feedback-box.partial {
    background: rgba(246,173,85,0.08);
    border: 1px solid rgba(246,173,85,0.25);
  }
  .feedback-verdict {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; font-size: 15px; margin-bottom: 10px;
  }
  .verdict-icon { font-size: 18px; }
  .feedback-body { color: var(--text); }
  .feedback-body code {
    background: var(--code-bg); border-radius: 4px;
    padding: 1px 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }

  /* SPINNER */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    height: 3px; background: var(--border); border-radius: 99px; margin: 24px 0 32px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }

  /* SECTION DIVIDER */
  .section-divider {
    display: flex; align-items: center; gap: 12px; margin: 32px 0 20px;
  }
  .section-divider-line { flex: 1; height: 1px; background: var(--border); }
  .section-divider-text { font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; white-space: nowrap; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  @media (max-width: 600px) {
    .main { padding: 24px 16px 60px; }
    .q-header { padding: 16px 16px 12px; }
    .q-body { padding: 12px 16px; }
    .lesson-header { padding: 20px 20px; }
    .api-banner { padding: 10px 16px; }
    .nav { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">APSC<span>177</span> Tutor</div>
  <div class="nav-tabs" id="navTabs"></div>
</nav>

<!-- API KEY BANNER -->
<div class="api-banner">
  <label>🔑 Anthropic API Key:</label>
  <input class="api-input" id="apiKeyInput" type="password" placeholder="sk-ant-api03-...">
  <button class="api-save-btn" onclick="saveKey()">Save Key</button>
  <span class="api-status warn" id="apiStatus">⚠ Key required for AI feedback</span>
</div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  ALL QUESTIONS DATA
// ═══════════════════════════════════════════════════════════════
const lessons = [
  {
    id: "practice-final",
    title: "Practice Mini Final Exam",
    tag: "Final Exam · April 16, 2026",
    desc: "26 multiple choice + 5 written questions covering all topics. 70 minutes.",
    questions: [
      {
        type: "mc", text: "What is the decimal representation of the 8-bit 2s complement number 0b1111_1100?",
        options: ["a) 8", "b) -8", "c) 4", "d) -4"],
        answer: "d) -4",
        answerDetail: "0b1111_1100 in 2s complement: the MSB is 1 so it's negative. Flip bits: 0b0000_0011 = 3, add 1 = 4. So the value is -4."
      },
      {
        type: "mc", text: "Given the following function definition, which function call would result in an error?\n\ndef my_fun(x=5, *y):\n    print(\"this is not fun\")",
        options: ["a) my_fun(\"hi\", \"bye\")", "b) my_fun()", "c) my_fun(\"hello\", \"hi\", \"bye\")", "d) None of these."],
        answer: "d) None of these.",
        answerDetail: "All calls work: x has a default of 5, so calling with no args is fine. Extra positional args go into *y. None cause errors."
      },
      {
        type: "mc", text: "What is the resulting output from running the code snippet below?\n\ndef my_fun(**x):\n    for v in x.values():\n        if v == 2:\n            return\n        print(\"going\")\nmy_fun(a=5, b=4, c=3, d=2)",
        options: ["a) going", "b) going\ngoing", "c) going\ngoing\ngoing", "d) going\ngoing\ngoing\ngoing"],
        answer: "c) going\ngoing\ngoing",
        answerDetail: "The function iterates: a=5 → prints 'going', b=4 → prints 'going', c=3 → prints 'going', d=2 → returns. So exactly 3 'going' lines."
      },
      {
        type: "mc", text: "What is the type of sys.argv in Python?",
        options: ["a) dictionary", "b) list", "c) string", "d) integer"],
        answer: "b) list",
        answerDetail: "sys.argv is always a list of strings. sys.argv[0] is the script name, sys.argv[1:] are the arguments passed."
      },
      {
        type: "mc", text: "What would appear in the terminal window as a result of running the code snippet below?\n\nx = \"four thousand\"\nprint(f\"x is {4000:,.1f}\")",
        options: ["a) x is 4,000.0", "b) x is 4000.0", "c) four thousand is 4,000.00", "d) four thousand is 4,000.0"],
        answer: "a) x is 4,000.0",
        answerDetail: "The f-string prints the literal text 'x is', then formats the number 4000 with comma separators (:,) and 1 decimal (.1f), giving 4,000.0."
      },
      {
        type: "mc", text: "What is the result of printing the following f-string?\n\nf\"|{12:5}|{123456:5}|\"",
        options: ["a) |   12|123456|", "b) |   12|12345|", "c) |   12|12345|6", "d) |12|12345|"],
        answer: "a) |   12|123456|",
        answerDetail: "{12:5} pads 12 to width 5 → '   12'. {123456:5} — width 5 is a minimum; if the number is wider, Python won't truncate it, so 123456 stays as-is."
      },
      {
        type: "mc", text: "Given the file contents shown below, which would result in a circular import error?\n\nfile1.py: import file2 / def a(): pass / file2.b()\nfile2.py: def b(): pass / import file1 / file1.a()",
        options: ["a) Running either file1.py or file2.py.", "b) Running file1.py only.", "c) Running file2.py only.", "d) A circular import is not possible with these files."],
        answer: "b) Running file1.py only.",
        answerDetail: "Running file1.py triggers the circular import loop. Running file2.py first works because file2 defines b() before importing file1."
      },
      {
        type: "mc", text: "A text file (my_file.txt) contains '123\\n456'. What will the output be?\n\nwith open(\"my_file.txt\",\"r\") as f:\n    print(f.read(5))\nprint(\"Done!\")",
        options: ["a) 1234\\nDone!", "b) 123\\n4\\nDone!", "c) 1234\\nDone!", "d) 123\\n\\nDone!"],
        answer: "b) 123\\n4\\nDone!",
        answerDetail: "read(5) reads exactly 5 characters: '1','2','3','\\n','4' → prints '123\\n4'. Then print('Done!')."
      },
      {
        type: "mc", text: "Given file1.py (print('foo') / import file2 / print('bar')) and file2.py (print('goo') / import file1 / print('car')), what is the output when file1.py is run?",
        options: ["a) foo / goo / foo / bar / car / bar", "b) foo / goo / car / bar", "c) foo / goo / bar / car", "d) foo / bar / goo / car"],
        answer: "b) foo / goo / car / bar",
        answerDetail: "file1 prints 'foo', imports file2 → file2 prints 'goo', file2 imports file1 (already cached, skipped), file2 prints 'car'. Control returns to file1 which prints 'bar'."
      },
      {
        type: "mc", text: "my_file.txt contains 'HeLLo\\nworLd'. Which code snippet gives output 'HeLLo\\nDone!'?",
        options: [
          "a) with open('my_file.txt','w') ...: print(f.readline()) / print('Done!')",
          "b) with open('my_file.txt','r') ...: print(f.readline()) / print('\\nDone!')",
          "c) with open('my_file.txt','x') ...: print(f.readline()) / print('Done!')",
          "d) with open('my_file.txt','r') ...: print(f.readline()) / print('Done!')"
        ],
        answer: "d) with open('my_file.txt','r') ...: print(f.readline()) / print('Done!')",
        answerDetail: "Mode 'r' opens for reading. readline() gets 'HeLLo\\n', print adds another newline → blank line. Then 'Done!'. Option b adds an extra \\n before Done!. Options a and c use wrong modes."
      },
      {
        type: "mc", text: "A file has two lines: '123\\n456'. Which code snippet prints the contents in a *single* line?",
        options: [
          "a) print(line1 + line2)  [after reading both lines]",
          "b) print(line1[:-1] + line2[:-1])  [after reading both lines]",
          "c) print(f.readline(), end='') / print(f.readline(), end='')",
          "d) Both a) and c)."
        ],
        answer: "b) print(line1[:-1] + line2[:-1])  [after reading both lines]",
        answerDetail: "line1[:-1] strips the trailing newline from '123\\n' → '123', then + line2[:-1] → '123456' in one line. Option a keeps newlines. Option c prints on separate lines because line1 has \\n built in."
      },
      {
        type: "mc", text: "What is the output from running the following code?\n\nclass A:\n    def __init__(self): self.x = 1\n    def __str__(self):\n        return f\"{self.x} + 1\"\na = A()\nprint(a)",
        options: ["a) 1", "b) 2", "c) X", "d) 1 + 1"],
        answer: "d) 1 + 1",
        answerDetail: "__str__ returns the string f\"{self.x} + 1\" which evaluates self.x as 1, giving '1 + 1'. The + 1 is a literal string, not arithmetic."
      },
      {
        type: "mc", text: "What is the output from running:\n\nclass X:\n    def __init__(self, x): self.x = x\nx1 = X(2)\nx2 = X(3)\nprint(x1 + x2)",
        options: ["a) A TypeError is raised.", "b) 4", "c) 5", "d) 6"],
        answer: "a) A TypeError is raised.",
        answerDetail: "Class X does not define __add__, so Python doesn't know how to add two X objects together → TypeError: unsupported operand type(s) for +."
      },
      {
        type: "mc", text: "Which class definition for X results in an error when running x = X(1) / print(x.x)?",
        options: [
          "a) class X: def __init__(self, x): x = x",
          "b) class X: def __init__(x): self.x = x",
          "c) class X: def __init__(self): self.x = x",
          "d) All of these would result in an error."
        ],
        answer: "d) All of these would result in an error.",
        answerDetail: "a) x=x doesn't set self.x, so x.x raises AttributeError. b) first arg should be self, so x=1 and 'self' is undefined. c) __init__ takes no extra arg, so X(1) raises TypeError. All error."
      },
      {
        type: "mc", text: "What is the proper way to create an instance of class Y?\n\nclass X:\n    def __init__(self, x): self.x = x\nclass Y(X):\n    def __init__(self): self.y = None",
        options: ["a) y = Y(2)", "b) y = Y()", "c) y = Y(X(2))", "d) None of these."],
        answer: "b) y = Y()",
        answerDetail: "Y overrides __init__ with no extra parameters (only self), so y = Y() is correct. Y(2) would fail because Y's __init__ takes only self."
      },
      {
        type: "mc", text: "What is the output from running:\n\nclass Test:\n    def __init__(self, x): self.x = x\nobj1 = Test(10)\nobj2 = Test(20)\nprint(obj1.x, obj2.x)",
        options: ["a) 20\\n20", "b) 10 20", "c) 20 20", "d) Error because __str__ is not defined."],
        answer: "b) 10 20",
        answerDetail: "Each instance stores its own x. obj1.x = 10, obj2.x = 20. print(obj1.x, obj2.x) prints them space-separated: '10 20'."
      },

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderLesson(lesson) {
  const el = document.getElementById('mainContent');

  let html = `
    <div class="lesson-header">
      <div class="lesson-tag">${escHtml(lesson.tag)}</div>
      <div class="lesson-title">${escHtml(lesson.title)}</div>
      <div class="lesson-desc">${escHtml(lesson.desc)}</div>
    </div>
    <div class="progress-label" id="progressLabel">0 / ${lesson.questions.length} answered</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  `;

  // Group by sections for final exam
  if (lesson.id === 'practice-final') {
    const mcQs = lesson.questions.filter(q => q.type === 'mc');
    const shortQs = lesson.questions.filter(q => q.type === 'written');
    const codeQs = lesson.questions.filter(q => q.type === 'code');

    html += renderSectionDivider('Questions 1–26 · Multiple Choice (1 mark each)');
    mcQs.forEach((q, i) => { html += renderQuestion(q, lesson.questions.indexOf(q)); });

    html += renderSectionDivider('Questions 27–29 · Short Written (3 marks each)');
    shortQs.forEach((q) => { html += renderQuestion(q, lesson.questions.indexOf(q)); });

    html += renderSectionDivider('Questions 30–31 · Code Writing (6 marks each)');
    codeQs.forEach((q) => { html += renderQuestion(q, lesson.questions.indexOf(q)); });
  } else {
    lesson.questions.forEach((q, i) => { html += renderQuestion(q, i); });
  }

  el.innerHTML = html;
  attachListeners(lesson);
}

function renderSectionDivider(text) {
  return `<div class="section-divider"><div class="section-divider-line"></div><div class="section-divider-text">${text}</div><div class="section-divider-line"></div></div>`;
}

function renderQuestion(q, idx) {
  const typeBadge = q.type === 'mc' ? '<span class="q-type-badge badge-mc">Multiple Choice</span>'
    : q.type === 'code' ? '<span class="q-type-badge badge-code">Code Writing</span>'
    : '<span class="q-type-badge badge-written">Written</span>';

  // Split question text: detect code blocks (lines starting with 4+ spaces or containing specific patterns)
  const textParts = formatQuestionText(q.text);

  let answerHtml = '';

  if (q.type === 'mc') {
    answerHtml = `<div class="mc-options">` +
      q.options.map((opt, oi) => `
        <label class="mc-option" id="opt-${idx}-${oi}">
          <input type="radio" name="mc-${idx}" value="${oi}" onchange="onMCChange(${idx})">
          <label>${escHtml(opt)}</label>
        </label>
      `).join('') +
      `</div>`;
  } else if (q.type === 'code') {
    answerHtml = `<div class="hint-label" style="margin-bottom:4px;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--accent);text-transform:uppercase;">Your Answer (Python code):</div>
      <textarea class="code-textarea" id="ans-${idx}" placeholder="# Write your Python code here..." onkeydown="handleTab(event)" rows="8"></textarea>`;
  } else {
    answerHtml = `<div class="hint-label" style="margin-bottom:4px;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--accent2);text-transform:uppercase;">Your Answer:</div>
      <textarea class="written-textarea" id="ans-${idx}" placeholder="Write your answer here..." rows="4"></textarea>`;
  }

  const hintSection = q.hint ? `
    <button class="hint-toggle" onclick="toggleHint(${idx})">💡 Click for a similar code example</button>
    <div class="hint-box" id="hint-${idx}">
      <div class="hint-label">Example / Hint</div><pre>${escHtml(q.hint)}</pre>
    </div>
  ` : '';

  return `
    <div class="question-card" id="card-${idx}">
      <div class="q-header">
        <span class="q-num">Q${idx + 1}</span>
        <div class="q-text">${textParts}</div>
        ${typeBadge}
      </div>
      <div class="q-body">
        ${answerHtml}
        ${hintSection}
        <div class="action-row">
          <button class="btn-submit" id="submit-${idx}" onclick="submitAnswer(${idx})">
            <div class="spinner" id="spin-${idx}"></div>
            <span id="submit-label-${idx}">Get AI Feedback</span>
          </button>
          <button class="btn-reveal" onclick="toggleReveal(${idx})">Show Answer</button>
        </div>
        <div class="feedback-box" id="feedback-${idx}"></div>
        <div class="answer-reveal" id="reveal-${idx}">
          <div class="answer-reveal-label">✓ Model Answer</div>
          <pre>${escHtml(q.answer)}</pre>
          ${q.answerDetail ? `<p style="margin-top:10px;color:var(--muted);font-size:13px;">💬 ${escHtml(q.answerDetail)}</p>` : ''}
        </div>
      </div>
    </div>
  `;
}

function formatQuestionText(text) {
  // Split on newlines, detect code-looking lines
  const lines = text.split('\n');
  let result = '';
  let inCode = false;
  let codeLines = [];

  function flushCode() {
    if (codeLines.length) {
      result += `<pre class="q-code">${escHtml(codeLines.join('\n'))}</pre>`;
      codeLines = [];
    }
    inCode = false;
  }

  lines.forEach(line => {
    const isCodeLine = line.startsWith('    ') || line.startsWith('\t') ||
      /^(def |class |import |from |if |else|elif |for |while |try|except|return |print\(|with )/.test(line.trimStart()) ||
      /[=\[\]{}()+\-*/:]\s*$/.test(line) || line.includes('#') ||
      line.match(/^\s*(self\.|super\(|\@|""")/);
    const isBlank = line.trim() === '';

    if (isCodeLine) {
      if (!inCode) inCode = true;
      codeLines.push(line);
    } else if (isBlank && inCode) {
      codeLines.push(line);
    } else {
      if (inCode) flushCode();
      result += `<span>${escHtml(line)}</span><br>`;
    }
  });
  if (inCode) flushCode();
  return result;
}

function handleTab(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = start + 4;
  }
}

function onMCChange(idx) {
  // Visual feedback on selection
  const opts = document.querySelectorAll(`[id^="opt-${idx}-"]`);
  opts.forEach(o => o.classList.remove('selected'));
  const checked = document.querySelector(`input[name="mc-${idx}"]:checked`);
  if (checked) checked.parentElement.classList.add('selected');
}

function toggleHint(idx) {
  const box = document.getElementById(`hint-${idx}`);
  box.classList.toggle('open');
}

function toggleReveal(idx) {
  const box = document.getElementById(`reveal-${idx}`);
  box.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════
//  PROGRESS TRACKING
// ═══════════════════════════════════════════════════════════════
const answered = new Set();

function updateProgress() {
  const lesson = lessons[currentLesson];
  const total = lesson.questions.length;
  const done = answered.size;
  const pct = total ? (done / total) * 100 : 0;
  const label = document.getElementById('progressLabel');
  const fill = document.getElementById('progressFill');
  if (label) label.textContent = `${done} / ${total} answered`;
  if (fill) fill.style.width = pct + '%';
}

// ═══════════════════════════════════════════════════════════════
//  AI FEEDBACK
// ═══════════════════════════════════════════════════════════════
async function submitAnswer(idx) {
  const lesson = lessons[currentLesson];
  const q = lesson.questions[idx];
  const btn = document.getElementById(`submit-${idx}`);
  const spinner = document.getElementById(`spin-${idx}`);
  const label = document.getElementById(`submit-label-${idx}`);
  const feedbackEl = document.getElementById(`feedback-${idx}`);

  if (!apiKey || !apiKey.startsWith('sk-ant-')) {
    feedbackEl.innerHTML = `<div class="feedback-verdict"><span class="verdict-icon">⚠️</span><span style="color:var(--accent3)">API Key Required</span></div>
      <div class="feedback-body">Please enter your Anthropic API key at the top of the page to get AI feedback. Your key stays in your browser's local storage and is sent only to Anthropic's API.</div>`;
    feedbackEl.className = 'feedback-box partial open';
    return;
  }

  // Get user answer
  let userAnswer = '';
  if (q.type === 'mc') {
    const checked = document.querySelector(`input[name="mc-${idx}"]:checked`);
    if (!checked) {
      feedbackEl.innerHTML = `<div class="feedback-body">Please select an answer first!</div>`;
      feedbackEl.className = 'feedback-box partial open';
      return;
    }
    userAnswer = q.options[parseInt(checked.value)];
  } else {
    userAnswer = document.getElementById(`ans-${idx}`).value.trim();
    if (!userAnswer) {
      feedbackEl.innerHTML = `<div class="feedback-body">Please write your answer first!</div>`;
      feedbackEl.className = 'feedback-box partial open';
      return;
    }
  }

  // Loading state
  btn.disabled = true;
  btn.classList.add('loading');
  spinner.classList.add('active');
  label.textContent = 'Marking...';
  feedbackEl.className = 'feedback-box open partial';
  feedbackEl.innerHTML = '<div class="feedback-body" style="color:var(--muted)">🤔 AI is reviewing your answer...</div>';

  const systemPrompt = `You are a friendly, encouraging Python tutor for a first-year engineering course (APSC 177 at UBC Okanagan). Your job is to give detailed, simple, and helpful feedback on student answers.

ALWAYS structure your response EXACTLY like this (use these exact labels):

VERDICT: [CORRECT / PARTIAL / INCORRECT]

FEEDBACK:
[2-4 sentences of plain English feedback. Say what they got right first, then what needs improvement. Use simple language. Be encouraging but honest. Reference specific parts of their answer.]

WHY IT WORKS (or WHY IT DOESN'T):
[1-3 sentences explaining the underlying Python concept. Use plain language. If they wrote code, point to specific lines.]

HOW TO IMPROVE:
[1-2 concrete actionable suggestions. If code: suggest exact changes or patterns to use. If written: say what key idea was missing.]

WHAT TO STUDY:
[1-2 specific Python topics to review. Be specific e.g. "Review how *args works in function definitions" not just "study functions".]

Keep the total response under 200 words. Use simple vocabulary — avoid jargon unless you explain it.`;

  const userPrompt = `Question (type: ${q.type}):
${q.text}

Correct answer:
${q.answer}

Additional context:
${q.answerDetail || 'N/A'}

Student's answer:
${userAnswer}

Please mark this answer and give helpful feedback.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const text = data.content?.[0]?.text || '';

    // Parse verdict
    const verdictMatch = text.match(/VERDICT:\s*(CORRECT|PARTIAL|INCORRECT)/i);
    const verdict = verdictMatch ? verdictMatch[1].toUpperCase() : 'PARTIAL';

    const icon = verdict === 'CORRECT' ? '✅' : verdict === 'INCORRECT' ? '❌' : '🟡';
    const verdictLabel = verdict === 'CORRECT' ? 'Correct!' : verdict === 'INCORRECT' ? 'Not quite right' : 'Partially correct';
    const cssClass = verdict === 'CORRECT' ? 'correct' : verdict === 'INCORRECT' ? 'incorrect' : 'partial';

    // Format the feedback text
    const feedbackText = text.replace(/VERDICT:.*\n?/i, '').trim();
    const formattedText = feedbackText
      .replace(/FEEDBACK:/g, '<strong style="color:var(--text)">📝 Feedback:</strong>')
      .replace(/WHY IT WORKS.*?:/gi, '<strong style="color:var(--text)">🔍 Why it works (or doesn\'t):</strong>')
      .replace(/HOW TO IMPROVE:/gi, '<strong style="color:var(--text)">🛠 How to improve:</strong>')
      .replace(/WHAT TO STUDY:/gi, '<strong style="color:var(--accent2)">📚 What to study:</strong>')
      .replace(/\n/g, '<br>');

    feedbackEl.innerHTML = `
      <div class="feedback-verdict">
        <span class="verdict-icon">${icon}</span>
        <span>${verdictLabel}</span>
      </div>
      <div class="feedback-body">${formattedText}</div>
    `;
    feedbackEl.className = `feedback-box ${cssClass} open`;

    answered.add(idx);
    updateProgress();

  } catch (err) {
    feedbackEl.innerHTML = `
      <div class="feedback-verdict"><span class="verdict-icon">⚠️</span><span style="color:var(--danger)">API Error</span></div>
      <div class="feedback-body">${escHtml(err.message)}<br><br>
      Common fixes:<br>
      • Check your API key is correct (starts with sk-ant-)<br>
      • Make sure your key has credits available at console.anthropic.com<br>
      • If deploying to GitHub Pages, the CORS header 'anthropic-dangerous-direct-browser-access' must be present (it is included in this app)</div>
    `;
    feedbackEl.className = 'feedback-box incorrect open';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    spinner.classList.remove('active');
    label.textContent = 'Get AI Feedback';
  }
}

// ═══════════════════════════════════════════════════════════════
//  ATTACH LISTENERS
// ═══════════════════════════════════════════════════════════════
function attachListeners(lesson) {
  answered.clear();
  updateProgress();
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
renderLesson(lessons[0]);
</script>
